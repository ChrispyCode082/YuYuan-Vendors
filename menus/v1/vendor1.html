<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Menu</title>

    <link rel="stylesheet" href="../menus.css">

</head>
<body>
    <header>
        <div class="business-header">
            <a href="../../index.html" class="return-button" data-en="← Return" data-zh="← 返回">← Return</a>
            <h1 data-en="Shanghai Traditional Yoghurt" data-zh="上海传统酸奶">Shanghai Traditional Yoghurt</h1>
        </div>

        <div class="toolbar">
            <input type="text" id="search" placeholder="Search dishes...">
            <nav>
                <button onclick="scrollToSection('entrees')" data-en="Entrees" data-zh="小吃">
                    Entrees
                </button>
                <button onclick="scrollToSection('desserts')" data-en="Desserts" data-zh="甜品">
                    Desserts
                </button>
                <button onclick="scrollToSection('drinks')">
                    
                </button>
            </nav>
        </div>

        <div class="payment-buttons">

            <button
                id="wechat-pay"
                class="payment-button wechat">

                WeChat Pay

            </button>

            <button
                id="alipay"
                class="payment-button alipay">

                Alipay

            </button>

        </div>
    </header>

    <main>
        <section id="entrees">
            <h2 data-en="Entrees" data-zh="小吃">Entrees</h2>
            <div class="menu-grid" id="entree-list"></div>
        </section>

        <section id="desserts">
            <h2 data-en="Desserts" data-zh="甜品">Desserts</h2>
            <div class="menu-grid" id="dessert-list"></div>
        </section>

        <section id="drinks">
            <h2></h2>
            <div class="menu-grid" id="drink-list"></div>
        </section>
    </main>

    <button id="lang-toggle" class="lang-toggle-button">
        中文
    </button>

<script src="vendor.js"></script>

</body>
</html>
